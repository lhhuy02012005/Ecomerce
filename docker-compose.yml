version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis-web2
    ports:
      - "6380:6379"
    restart: always
    networks:
      - default
  db:
    image: mysql:latest
    container_name: mysql-web2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: web2
      MYSQL_USER: web2
      MYSQL_PASSWORD: web2password
    ports:
      - "3308:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
